[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
env =
    MONGODB_URL=mongodb://localhost:27017
    MONGODB_DB_NAME=agrobrain_test
    REDIS_URL=redis://localhost:6379
    SECRET_KEY=test_secret_key_change_me_123
    ALGORITHM=HS256
    OPENWEATHER_API_KEY=test_weather_key
    OPENAI_API_KEY=test_openai_key
    FIREBASE_PROJECT_ID=test-agro-brain
